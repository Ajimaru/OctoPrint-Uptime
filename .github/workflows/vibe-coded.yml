name: Vibe Coded Badge

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: vibe-coded-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-badge:
    name: Update vibe-coded badge
    runs-on: ubuntu-latest
    # The action itself pushes the README update; skip those commits so the
    # workflow does not retrigger itself in a loop.
    if: "!contains(github.event.head_commit.message, '[skip vibe-badge]')"
    permissions:
      contents: write
    steps:
      - # Full history is required so the action can classify every commit.
        # Check out with VIBE_BADGE_TOKEN (a PAT) so the badge commit can be
        # pushed past branch protection on main; the default GITHUB_TOKEN is
        # rejected by the protected branch. Falls back to GITHUB_TOKEN if the
        # secret is unset (push will then be skipped, not fail the run).
        name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.VIBE_BADGE_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - # Recompute the AI-authored commit percentage and rewrite the badge in
        # README.md. badge-style is flat-square to match the other README
        # badges (the social ones excepted, which keep style=social).
        name: Update badge
        uses: ai-ecoverse/vibe-coded-badge-action@c6875e7a00b5fa208aef24a2e083ccbe13fa870d # main
        with:
          badge-style: flat-square
          badge-color: ff69b4
          badge-text: Vibe_Coded
          commit-message: "chore: update vibe-coded badge [skip vibe-badge]"
